</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <h1>MyShop</h1>
        </div>

        <nav>

            <a href="dashboard.html">Dashboard</a>

    <!-- Cart Section -->
    <section class="featured-products">

        <div id="cartContainer"></div>

        <h3 id="totalPrice">
            Total: ₹0

        <br><br>

        <a href="checkout.html">
            <button id="checkoutBtn">
                Proceed to Checkout
            </button>
        </a>

    </section>

    <footer>

    </footer>

    <script src="js/cart.js"></script>
